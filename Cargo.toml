[workspace]

members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Andrei Tumbar"]

[package]
name = "spacewasm"
version.workspace = true
authors.workspace = true
edition.workspace = true

[lib]
name = "spacewasm"
path = "src/lib.rs"

[dependencies]
libm = "0.2.16"

[profile.release]
opt-level = 3
lto = true
debug = "full"
panic = "unwind"
