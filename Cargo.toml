[workspace]

members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Andrei Tumbar"]

[package]
name = "spacewasm"
version.workspace = true
authors.workspace = true
edition.workspace = true

[lib]
name = "spacewasm"
path = "src/lib.rs"

[features]
default = []

# Use the `std` crate to perform math functions
# These are provided by the C libm which typically provide the best performance
# This feature may not be portable on all platforms (depends on support by Rust std)
std-math = []

# Perform a bounds check on every stack access.
# This is usually not necessary since stack accesses are already checked up-front
# by the verifier. Useful for fuzzing/regression testing
strict-assertions = []

[dependencies]
libm = "0.2.16"

[dev-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = 3
lto = true
debug = "full"
panic = "abort"
codegen-units = 1

[profile.bench]
opt-level = 3
lto = true
codegen-units = 1
